<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holly — mwilliams.cc</title>
  <link rel="stylesheet" href="holly.css">
</head>
<body>
<div class="page-wrapper">
  <div class="jmc-header">
    <div class="ship-name">Jupiter Mining Corporation &nbsp;◈&nbsp; MV Red Dwarf</div>
  </div>
  <div class="interface-container">
    <div class="monitor-outer">
      <div class="monitor-screen-bezel">
        <div class="holly-screen">
          <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExZXk2NHdkNmhlYTdqYzV5M3lvOGJlMjQ5NGhrNzNjMWxoYnVzdDkxNiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/THoEA3MU3lOWI41FPA/giphy.gif" alt="Holly">
        </div>
      </div>
    </div>
    <div class="chat-section">
      <div class="chat-log" id="chat-log"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Transmit data..." autocomplete="off">
        <button id="chat-send">SEND</button>
      </div>
    </div>
  </div>
</div>
<script src="holly.js"></script>
</body>
</html>
