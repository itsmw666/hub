<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holly — mwilliams.cc</title>
  <meta name="description" content="Holly, the AI computer of mining vessel Red Dwarf. IQ of 6000. Three million years into deep space. Accepting visitors.">
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="holly.css">
</head>
<body>

<div class="page-wrapper">

  <div class="jmc-header">
    <div class="ship-name">Jupiter Mining Corporation &nbsp;◈&nbsp; Mining Vessel Red Dwarf</div>
    <div class="status-line">SHIPBOARD AI INTERFACE &nbsp;//&nbsp; ONLINE &nbsp;//&nbsp; 3,000,000 YEARS FROM EARTH</div>
  </div>

  <!-- THE MONITOR -->
  <div class="monitor-outer">
    <div class="monitor-controls">
      <span></span><span></span><span></span>
    </div>
    <div class="monitor-screen-bezel">
      <div class="holly-screen" id="holly-screen">
        <div class="holly-face" id="holly-face">
          <img
            src="https://media1.giphy.com/media/l0HlBO7eyXzSZkJri/giphy.gif"
            alt="Holly, ship's computer"
            onerror="this.style.display='none'; document.getElementById('holly-fallback').style.display='flex';"
          >
          <div id="holly-fallback" style="display:none; position:absolute; top:0;left:0;right:0;bottom:0; align-items:center; justify-content:center; flex-direction:column; gap:1rem;">
            <div style="font-family:'VT323',monospace; font-size:4rem; color:#00ff41; text-shadow: 0 0 20px rgba(0,255,65,0.5);">HOLLY</div>
            <div style="font-family:'Share Tech Mono',monospace; font-size:0.7rem; color:#444; letter-spacing:0.2em;">IQ: 6000</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-section">
    <div class="chat-label">Shipboard Communications Terminal</div>

    <div class="chat-log" id="chat-log">
      <div id="typing-indicator" class="typing-indicator">
        <div class="sender">HOLLY</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="chat-input-row">
      <input
        type="text"
        class="chat-input"
        id="chat-input"
        placeholder="Say something..."
        maxlength="280"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="chat-send" id="chat-send">TRANSMIT</button>
    </div>
  </div>

  <div class="site-nav">
    <a href="/index.html">← mwilliams.cc</a>
    &nbsp;&nbsp;◈&nbsp;&nbsp;
    <a href="/llm/">LLM Research</a>
    &nbsp;&nbsp;◈&nbsp;&nbsp;
    <a href="/tides/">Menai Tides</a>
  </div>

</div>

<script src="holly.js"></script>
</body>
</html>
