<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Round Anglesey Passage Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #06101c;
            --panel-bg: #0a1a2b;
            --teal: #00f2ff;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); font-family: sans-serif; overflow: hidden; }
        
        /* Map takes up remaining space above the bars */
        #map { height: calc(100% - 140px); width: 100%; background: var(--bg-color); }
        
        /* Wind Bar: Distributed across full width */
        #wind-panel {
            height: 120px;
            background: var(--panel-bg);
            display: flex;
            justify-content: space-around; /* Spreads icons across the screen */
            align-items: center;
            border-top: 2px solid var(--teal);
            overflow-x: auto;
        }
        .wind-item {
            flex: 1; /* Allows items to grow and fill space */
            min-width: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--teal);
        }
        .wind-name { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; text-align: center; }
        .wind-arrow { width: 30px; height: 30px; fill: var(--teal); transition: transform 0.5s ease; }
        .wind-data { font-size: 14px; font-weight: bold; margin-top: 2px; }

        /* Mandatory Attribution Bar */
        #attribution-bar {
            height: 20px;
            background: #000;
            color: #888;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #1a3a5a;
        }
        #attribution-bar a { color: var(--teal); text-decoration: none; }

        /* Update Flash Animation */
        @keyframes wind-flash {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(2.5) drop-shadow(0 0 8px var(--teal)); transform: scale(1.1); }
            100% { filter: brightness(1); transform: scale(1); }
        }
        .flash-active { animation: wind-flash 3s ease-in-out; }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { background: var(--panel-bg); color: white; border: 1px solid var(--teal); min-width: 180px; }
        .leaflet-popup-tip { background: var(--teal); }
        h3 { margin: 0 0 8px 0; color: var(--teal); font-size: 16px; border-bottom: 1px solid #1a3a5a; padding-bottom: 4px; }
        .tide-row { margin-bottom: 4px; font-size: 13px; font-family: monospace; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="wind-panel"></div>
<div id="attribution-bar">
    Weather via <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a> | Tides via ADMIRALTY API | Charts via Esri Ocean
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [53.3, -4.4], zoom: 10 });

    // Restored High-Fidelity Nautical Chart Source (Esri Oceans)
    const chartLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
        maxZoom: 13,
        attribution: 'Esri, Garmin, GEBCO, NOAA'
    });
    
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    const baseLayers = { "Satellite": satLayer, "Nautical": chartLayer };
    L.control.layers(baseLayers).addTo(map);

    const waypoints = [
        { name: "South Stack", lat: 53.306, lon: -4.698, stationId: "0478" },
        { name: "Carmel Head", lat: 53.405, lon: -4.604, stationId: "0478" },
        { name: "Point Lynas", lat: 53.416, lon: -4.288, stationId: "0480" },
        { name: "Puffin Island", lat: 53.318, lon: -4.028, stationId: "0480" },
        { name: "The Swellies", lat: 53.221, lon: -4.184, stationId: "0480" },
        { name: "Caernarfon Bar", lat: 53.122, lon: -4.414, stationId: "0475" }
    ];

    const markers = {};
    waypoints.forEach(wp => {
        // Corrected Marker logic to ensure interactivity is active
        const m = L.circleMarker([wp.lat, wp.lon], {
            radius: 8, color: '#000', weight: 2, fillColor: '#00f2ff', fillOpacity: 1, interactive: true
        }).addTo(map);
        
        m.bindPopup(`<h3>${wp.name}</h3><div class="tide-content">Fetching data...</div>`);
        markers[wp.name] = { marker: m, stationId: wp.stationId };
    });

    async function updateTides() {
        for (const wp of waypoints) {
            try {
                // Duration set to 48 hours to cross the midnight boundary safely
                const res = await fetch(`./tidal-proxy.php?endpoint=tidewindow&stationId=${wp.stationId}&duration=48`);
                const data = await res.json();
                const events = data.Items || (Array.isArray(data) ? data : []); 
                
                const now = new Date();
                const future = events.filter(e => new Date(e.DateTime) > now);
                
                const hw = future.find(e => e.EventType === 'HighWater');
                const lw = future.find(e => e.EventType === 'LowWater');
                
                let html = '';
                html += `<div class="tide-row"><strong>Next HW:</strong> ${hw ? new Date(hw.DateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' (' + hw.Height.toFixed(1) + 'm)' : 'Pending'}</div>`;
                html += `<div class="tide-row"><strong>Next LW:</strong> ${lw ? new Date(lw.DateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' (' + lw.Height.toFixed(1) + 'm)' : 'Pending'}</div>`;
                
                markers[wp.name].marker.getPopup().setContent(`<h3>${wp.name}</h3>${html}`);
            } catch (e) { 
                console.error("Tide error:", e);
                markers[wp.name].marker.getPopup().setContent(`<h3>${wp.name}</h3><p>Data Unavailable</p>`);
            }
        }
    }

    async function fetchWindData() {
        const panel = document.getElementById('wind-panel');
        panel.innerHTML = '';
        for (const wp of waypoints) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${wp.lat}&longitude=${wp.lon}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn`);
                const data = await res.json();
                const speed = Math.round(data.current.wind_speed_10m);
                const dir = data.current.wind_direction_10m;

                const div = document.createElement('div');
                div.className = 'wind-item';
                div.innerHTML = `
                    <div class="wind-name">${wp.name}</div>
                    <svg class="wind-arrow flash-active" viewBox="0 0 24 24" style="transform: rotate(${dir}deg)">
                        <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                    </svg>
                    <div class="wind-data">${speed} kn</div>
                `;
                panel.appendChild(div);
                
                // Pulse effect lasts 3 seconds on load/refresh
                setTimeout(() => {
                    const arrow = div.querySelector('.wind-arrow');
                    if(arrow) arrow.classList.remove('flash-active');
                }, 3000);
            } catch (e) { console.error("Wind error:", e); }
        }
    }

    // Initial Load
    updateTides();
    fetchWindData();
    
    // Refresh every 10 mins
    setInterval(fetchWindData, 600000);
    setInterval(updateTides, 600000);
</script>

</body>
</html>
