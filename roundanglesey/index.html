<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Round Anglesey Passage Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #06101c;
            --panel-bg: #0a1a2b;
            --teal: #00f2ff;
            --radar-green: #00ff00;
            --radar-land: #004400;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); font-family: sans-serif; overflow: hidden; }
        #map { height: calc(100% - 120px); width: 100%; background: var(--bg-color); }
        
        /* Wind Bar Styling */
        #wind-panel {
            height: 120px;
            background: var(--panel-bg);
            display: flex;
            overflow-x: auto;
            border-top: 2px solid var(--teal);
            align-items: center;
        }
        .wind-item {
            flex: 0 0 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--teal);
            border-right: 1px solid #1a3a5a;
        }
        .wind-name { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .wind-arrow { width: 30px; height: 30px; fill: var(--teal); transition: transform 0.5s ease; }
        .wind-data { font-size: 14px; font-weight: bold; margin-top: 2px; }

        /* Pulse Animation */
        @keyframes wind-flash {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(2.5) drop-shadow(0 0 10px var(--teal)); transform: scale(1.2); }
            100% { filter: brightness(1); transform: scale(1); }
        }
        .flash-active { animation: wind-flash 3s ease-in-out; }

        /* Popup Styling */
        .leaflet-popup-content-wrapper { background: var(--panel-bg); color: white; border: 1px solid var(--teal); }
        .leaflet-popup-tip { background: var(--teal); }
        h3 { margin: 0 0 5px 0; color: var(--teal); font-size: 16px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="wind-panel"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { center: [53.3, -4.4], zoom: 10 });

    // 1. Layer Definitions
    const chartLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'); // Placeholder for Chart
    const satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    
    // Accurate Radar Schematic Layer
    const radarCoastline = [[53.44,-4.45],[53.475,-4.31],[53.44,-4.17],[53.35,-4.03],[53.28,-4.02],[53.21,-4.12],[53.16,-4.21],[53.12,-4.41],[53.15,-4.58],[53.24,-4.69],[53.34,-4.73],[53.41,-4.63],[53.44,-4.45]];
    const schematicIsland = L.polygon(radarCoastline, {
        color: var(--radar-green), weight: 2, fillColor: var(--radar-land), fillOpacity: 1
    });

    const baseLayers = { "Radar": schematicIsland, "Nautical": chartLayer, "Satellite": satLayer };
    L.control.layers(baseLayers).addTo(map);
    schematicIsland.addTo(map);

    // 2. Waypoint Data
    const waypoints = [
        { name: "South Stack", lat: 53.306, lon: -4.698, stationId: "0478" },
        { name: "Carmel Head", lat: 53.405, lon: -4.604, stationId: "0478" },
        { name: "Point Lynas", lat: 53.416, lon: -4.288, stationId: "0480" },
        { name: "Puffin Island", lat: 53.318, lon: -4.028, stationId: "0480" },
        { name: "The Swellies", lat: 53.221, lon: -4.184, stationId: "0480" },
        { name: "Caernarfon Bar", lat: 53.122, lon: -4.414, stationId: "0475" }
    ];

    const markers = {};
    waypoints.forEach(wp => {
        const m = L.circleMarker([wp.lat, wp.lon], {
            radius: 8, color: '#000', weight: 2, fillColor: var(--teal), fillOpacity: 1
        }).addTo(map).bindPopup(`<h3>${wp.name}</h3><p>Loading tides...</p>`);
        markers[wp.name] = { marker: m, lat: wp.lat, lon: wp.lon };
    });

    // 3. Functional Logic: Tides
    async function updateTides() {
        for (const wp of waypoints) {
            try {
                const res = await fetch(`./tidal-proxy.php?endpoint=tidewindow&stationId=${wp.stationId}&duration=1`);
                const data = await res.json();
                const events = data.Items ? data.Items : (Array.isArray(data) ? data : []); 
                const now = new Date();
                const future = events.filter(e => new Date(e.DateTime) > now);
                const hw = future.find(e => e.EventType === 'HighWater');
                const lw = future.find(e => e.EventType === 'LowWater');
                
                let content = '';
                content += hw ? `<strong>Next HW:</strong> ${new Date(hw.DateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} (${hw.Height.toFixed(1)}m)<br>` : `<strong>Next HW:</strong> No data today<br>`;
                content += lw ? `<strong>Next LW:</strong> ${new Date(lw.DateTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} (${lw.Height.toFixed(1)}m)` : `<strong>Next LW:</strong> No data today`;
                
                markers[wp.name].marker.setPopupContent(`<h3>${wp.name}</h3><p>${content}</p>`);
            } catch (e) { console.error("Tide error", e); }
        }
    }

    // 4. Functional Logic: Wind
    async function fetchWindData() {
        const panel = document.getElementById('wind-panel');
        panel.innerHTML = '';
        for (const wp of waypoints) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${wp.lat}&longitude=${wp.lon}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=kn`);
                const data = await res.json();
                const speed = Math.round(data.current.wind_speed_10m);
                const dir = data.current.wind_direction_10m;

                const div = document.createElement('div');
                div.className = 'wind-item';
                div.innerHTML = `
                    <div class="wind-name">${wp.name}</div>
                    <svg class="wind-arrow" id="arrow-${wp.name.replace(/\s+/g, '')}" viewBox="0 0 24 24" style="transform: rotate(${dir}deg)">
                        <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
                    </svg>
                    <div class="wind-data">${speed} kn</div>
                `;
                panel.appendChild(div);
                
                // Trigger Flash
                const arrow = div.querySelector('.wind-arrow');
                arrow.classList.add('flash-active');
                setTimeout(() => arrow.classList.remove('flash-active'), 3000);
            } catch (e) { console.error("Wind error", e); }
        }
    }

    // Initialize
    updateTides();
    fetchWindData();
    setInterval(fetchWindData, 600000); // 10 min refresh
</script>

</body>
</html>
