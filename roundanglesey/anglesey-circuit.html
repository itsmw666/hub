<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anglesey Circuit - Passage Planner</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy: #06101c;
            --dark-blue: #0e1f30;
            --teal: #00c9b0;
            --teal-light: #00e8cc;
            --amber: #f0a500;
            --red: #e03a3a;
            --green: #2ec96e;
            --text: #b8d4ee;
            --muted: #3a6080;
        }

        body {
            font-family: 'Barlow Condensed', sans-serif;
            background: var(--navy);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        /* Layer Switcher */
        .layer-switcher {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            background: rgba(14, 31, 48, 0.95);
            border: 1px solid var(--teal);
            border-radius: 4px;
            padding: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .layer-switcher label {
            display: block;
            margin: 5px 0;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.2s;
        }

        .layer-switcher label:hover {
            color: var(--teal-light);
        }

        .layer-switcher input[type="radio"] {
            margin-right: 8px;
            accent-color: var(--teal);
        }

        /* Direction Toggle Button */
        .direction-toggle {
            position: absolute;
            bottom: 200px;
            left: 10px;
            z-index: 1000;
            background: rgba(14, 31, 48, 0.95);
            border: 2px solid var(--teal);
            border-radius: 4px;
            padding: 12px 20px;
            color: var(--text);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .direction-toggle:hover {
            background: var(--teal);
            color: var(--navy);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 201, 176, 0.4);
        }

        /* Wind Data Panel */
        .wind-panel {
            background: var(--dark-blue);
            border-top: 2px solid var(--teal);
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            min-height: 120px;
            z-index: 2;
        }

        .wind-location {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .location-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 14px;
            color: var(--teal);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wind-arrow {
            width: 40px;
            height: 40px;
            position: relative;
        }

        .wind-data {
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            text-align: center;
        }

        .wind-speed {
            font-size: 18px;
            font-weight: bold;
            color: var(--teal-light);
        }

        .beaufort {
            font-size: 11px;
            color: var(--muted);
        }

        /* Footer */
        footer {
            background: var(--navy);
            border-top: 1px solid var(--muted);
            padding: 8px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 12px;
            line-height: 1.5;
            color: var(--muted);
        }

        /* Loading State */
        .loading {
            opacity: 0.5;
        }

        /* Leaflet Popup Customization */
        .leaflet-popup-content-wrapper {
            background: rgba(14, 31, 48, 0.98);
            color: var(--text);
            border: 1px solid var(--teal);
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .leaflet-popup-content {
            margin: 15px;
            font-size: 14px;
        }

        .leaflet-popup-content h3 {
            color: var(--teal);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .leaflet-popup-content p {
            margin: 5px 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
        }

        .leaflet-popup-tip {
            background: rgba(14, 31, 48, 0.98);
            border: 1px solid var(--teal);
        }

        /* Custom Marker Icons */
        .waypoint-icon {
            background: var(--teal);
            border: 3px solid var(--navy);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            box-shadow: 0 0 10px rgba(0, 201, 176, 0.6);
        }

        /* Animated Route */
        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes dash-reverse {
            to {
                stroke-dashoffset: 40;
            }
        }
    </style>
</head>
<body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- Layer Switcher -->
    <div class="layer-switcher">
        <label>
            <input type="radio" name="layer" value="nautical" checked>
            Nautical Chart
        </label>
        <label>
            <input type="radio" name="layer" value="satellite">
            Satellite
        </label>
        <label>
            <input type="radio" name="layer" value="schematic">
            Schematic
        </label>
    </div>

    <!-- Direction Toggle -->
    <button class="direction-toggle" id="directionToggle">
        Clockwise ↻
    </button>

    <!-- Wind Data Panel -->
    <div class="wind-panel" id="windPanel">
        <div class="loading">Loading wind data...</div>
    </div>

    <!-- Footer -->
    <footer>
        Contains ADMIRALTY® tidal data: © Crown Copyright and database right.
    </footer>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize map centered on Anglesey
        const map = L.map('map', {
            center: [53.28, -4.35],
            zoom: 10,
            zoomControl: true
        });

        // Define tile layers
        const nauticalLayer = L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
            attribution: 'Map data: &copy; <a href="https://www.openseamap.org">OpenSeaMap</a> contributors'
        });

        const baseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        });

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        // Create schematic layer (dark background with SVG outline)
        const schematicLayer = L.tileLayer('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==', {
            attribution: ''
        });

        // Set default layers
        baseLayer.addTo(map);
        nauticalLayer.addTo(map);

        let currentBaseLayer = 'nautical';

        // Waypoint data
        const waypoints = [
            { name: 'Caernarfon Bar', lat: 53.08, lng: -4.47 },
            { name: 'South Stack', lat: 53.30, lng: -4.70 },
            { name: 'Carmel Head', lat: 53.40, lng: -4.65 },
            { name: 'Point Lynas', lat: 53.42, lng: -4.47 },
            { name: 'Beaumaris', lat: 53.32, lng: -4.10 },
            { name: 'The Swellies', lat: 53.22, lng: -4.17 }
        ];

        // Create custom icon
        const waypointIcon = L.divIcon({
            className: 'waypoint-icon',
            iconSize: [16, 16],
            iconAnchor: [8, 8],
            popupAnchor: [0, -8]
        });

        // Add waypoints to map
        waypoints.forEach(wp => {
            const marker = L.marker([wp.lat, wp.lng], { icon: waypointIcon }).addTo(map);
            marker.bindPopup(`
                <h3>${wp.name}</h3>
                <p><strong>Tidal Stream:</strong> 2.5kn NE (Springs)</p>
                <p><strong>Next HW:</strong> 14:23 GMT (4.2m)</p>
                <p><strong>Next LW:</strong> 08:15 GMT (1.8m)</p>
                <p><strong>Wind:</strong> Loading...</p>
            `);
        });

        // Create route polyline
        const routeCoords = waypoints.map(wp => [wp.lat, wp.lng]);
        routeCoords.push(routeCoords[0]); // Close the circuit

        let routeLine = L.polyline(routeCoords, {
            color: '#00c9b0',
            weight: 3,
            opacity: 0.8,
            dashArray: '10, 10',
            className: 'route-line'
        }).addTo(map);

        // Animation state
        let isClockwise = true;
        let animationOffset = 20;

        // Animate route
        function animateRoute() {
            const pathElement = document.querySelector('.route-line');
            if (pathElement) {
                if (isClockwise) {
                    pathElement.style.strokeDashoffset = animationOffset;
                    pathElement.style.animation = 'dash 2s linear infinite';
                } else {
                    pathElement.style.strokeDashoffset = -animationOffset;
                    pathElement.style.animation = 'dash-reverse 2s linear infinite';
                }
            }
        }

        setTimeout(animateRoute, 100);

        // Direction toggle
        const directionToggle = document.getElementById('directionToggle');
        directionToggle.addEventListener('click', () => {
            isClockwise = !isClockwise;
            directionToggle.textContent = isClockwise ? 'Clockwise ↻' : 'Anticlockwise ↺';

            // Reverse route coordinates
            routeCoords.reverse();
            map.removeLayer(routeLine);
            routeLine = L.polyline(routeCoords, {
                color: '#00c9b0',
                weight: 3,
                opacity: 0.8,
                dashArray: '10, 10',
                className: 'route-line'
            }).addTo(map);

            setTimeout(animateRoute, 100);
        });

        // Layer switcher
        document.querySelectorAll('input[name="layer"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const layer = e.target.value;

                // Remove all layers
                map.removeLayer(baseLayer);
                map.removeLayer(nauticalLayer);
                map.removeLayer(satelliteLayer);
                map.removeLayer(schematicLayer);

                // Add selected layer
                if (layer === 'nautical') {
                    baseLayer.addTo(map);
                    nauticalLayer.addTo(map);
                } else if (layer === 'satellite') {
                    satelliteLayer.addTo(map);
                } else if (layer === 'schematic') {
                    // Add dark background
                    map.getPane('tilePane').style.background = '#06101c';
                    schematicLayer.addTo(map);
                    drawSchematicOutline();
                } else {
                    map.getPane('tilePane').style.background = '';
                }

                currentBaseLayer = layer;
            });
        });

        // Draw schematic outline of Anglesey
        function drawSchematicOutline() {
            // Simplified outline of Anglesey
            const outline = [
                [53.42, -4.47], // Point Lynas
                [53.40, -4.65], // Carmel Head
                [53.30, -4.70], // South Stack
                [53.15, -4.65],
                [53.08, -4.47], // Caernarfon Bar
                [53.10, -4.30],
                [53.22, -4.17], // Swellies
                [53.32, -4.10], // Beaumaris
                [53.38, -4.15],
                [53.42, -4.25],
                [53.42, -4.47]
            ];

            L.polyline(outline, {
                color: '#3a6080',
                weight: 2,
                opacity: 0.8,
                fill: false
            }).addTo(map);
        }

        // Fetch wind data from Open-Meteo API
        async function fetchWindData() {
            const windPanel = document.getElementById('windPanel');

            try {
                const promises = waypoints.map(async wp => {
                    const url = `https://api.open-meteo.com/v1/forecast?latitude=${wp.lat}&longitude=${wp.lng}&current=wind_speed_10m,wind_direction_10m,wind_gusts_10m&wind_speed_unit=kn`;
                    const response = await fetch(url);
                    const data = await response.json();
                    return {
                        name: wp.name,
                        speed: Math.round(data.current.wind_speed_10m),
                        direction: data.current.wind_direction_10m,
                        gusts: Math.round(data.current.wind_gusts_10m)
                    };
                });

                const windData = await Promise.all(promises);
                displayWindData(windData);
            } catch (error) {
                console.error('Error fetching wind data:', error);
                windPanel.innerHTML = '<div style="color: var(--red);">Failed to load wind data</div>';
            }
        }

        // Display wind data
        function displayWindData(windData) {
            const windPanel = document.getElementById('windPanel');
            windPanel.innerHTML = '';

            windData.forEach(data => {
                const beaufort = getBeaufortScale(data.speed);

                const locationDiv = document.createElement('div');
                locationDiv.className = 'wind-location';
                locationDiv.innerHTML = `
                    <div class="location-name">${data.name}</div>
                    <svg class="wind-arrow" viewBox="0 0 40 40">
                        <defs>
                            <linearGradient id="arrowGradient-${data.name}" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style="stop-color:#00e8cc;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#00c9b0;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <g transform="rotate(${data.direction} 20 20)">
                            <path d="M 20 5 L 25 25 L 20 20 L 15 25 Z" fill="url(#arrowGradient-${data.name})" />
                            <line x1="20" y1="25" x2="20" y2="35" stroke="#00c9b0" stroke-width="2" />
                        </g>
                    </svg>
                    <div class="wind-data">
                        <div class="wind-speed">${data.speed} kn</div>
                        <div class="beaufort">F${beaufort} (${data.direction}°)</div>
                        <div class="beaufort">Gusts: ${data.gusts} kn</div>
                    </div>
                `;
                windPanel.appendChild(locationDiv);
            });
        }

        // Calculate Beaufort scale from wind speed in knots
        function getBeaufortScale(knots) {
            if (knots < 1) return 0;
            if (knots < 4) return 1;
            if (knots < 7) return 2;
            if (knots < 11) return 3;
            if (knots < 17) return 4;
            if (knots < 22) return 5;
            if (knots < 28) return 6;
            if (knots < 34) return 7;
            if (knots < 41) return 8;
            if (knots < 48) return 9;
            if (knots < 56) return 10;
            if (knots < 64) return 11;
            return 12;
        }

        // Fetch wind data on load
        fetchWindData();

        // Refresh wind data every 10 minutes
        setInterval(fetchWindData, 600000);
    </script>
</body>
</html>
